<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Import / Export</title>
  <link rel="stylesheet" href="../css/csv_style.css" />
</head>
<body>

<div class="csv_container">

  <div class="csv_header">
    <span style="font-size:1.8rem;">📊</span>
    <h1>CSV Import / Export</h1>
  </div>

  <!-- Toolbar -->
  <div class="csv_toolbar">
    <button class="csv_btn csv_btn_primary" onclick="csv_addRow()">＋ Add Row</button>
    <button class="csv_btn csv_btn_secondary" onclick="csv_addColumn()">＋ Add Column</button>
    <button class="csv_btn csv_btn_success" onclick="csv_exportCSV()">⬇ Export CSV</button>
    <button class="csv_btn csv_btn_secondary" onclick="csv_importCSV()">⬆ Import CSV</button>
    <button class="csv_btn csv_btn_editor" onclick="csv_openEditor()">✏ Open CSV Editor</button>

    <!-- Delimiter selection -->
    <div class="csv_delimiter_group">
      <label for="csv_delimiter">Delimiter:</label>
      <select id="csv_delimiter" class="csv_delimiter_select">
        <option value=","  selected>Comma (,)</option>
        <option value=";">Semicolon (;)</option>
        <option value="&#9;">Tab</option>
      </select>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="csv_file_input" accept=".csv,text/csv" style="display:none" />
  </div>

  <!-- Table -->
  <div class="csv_table_wrapper">
    <table class="csv_table" id="csv_table"></table>
  </div>

  <!-- Status -->
  <div class="csv_status" id="csv_status"></div>

</div>

<script src="../js/csv_handler.js"></script>
</body>
</html>
