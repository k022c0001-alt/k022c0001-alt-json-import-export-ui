<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Import / Export</title>
  <link rel="stylesheet" href="../css/json_style.css" />
</head>
<body>

<div class="json_container">

  <div class="json_header">
    <span style="font-size:1.8rem;">📋</span>
    <h1>JSON Import / Export</h1>
  </div>

  <!-- Toolbar -->
  <div class="json_toolbar">
    <button class="json_btn json_btn_primary" onclick="json_addRow()">＋ Add Row</button>
    <button class="json_btn json_btn_secondary" onclick="json_addColumn()">＋ Add Column</button>
    <button class="json_btn json_btn_success" onclick="json_exportJSON()">⬇ Export JSON</button>
    <button class="json_btn json_btn_secondary" onclick="json_importJSON()">⬆ Import JSON</button>
    <button class="json_btn json_btn_editor" onclick="json_openEditor()">✏ Open JSON Editor</button>
    <!-- Hidden file input -->
    <input type="file" id="json_file_input" accept=".json,application/json" style="display:none" />
  </div>

  <!-- Table -->
  <div class="json_table_wrapper">
    <table class="json_table" id="json_table"></table>
  </div>

  <!-- Status -->
  <div class="json_status" id="json_status"></div>

</div>

<script src="../js/json_handler.js"></script>
</body>
</html>
