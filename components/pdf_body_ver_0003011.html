<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Export</title>
  <link rel="stylesheet" href="../css/pdf_style.css" />
</head>
<body>

<div class="pdf_container">

  <div class="pdf_header no-print">
    <span style="font-size:1.8rem;">🖨️</span>
    <h1>PDF Export</h1>
  </div>

  <!-- Toolbar (hidden on print via no-print class) -->
  <div class="pdf_toolbar no-print">
    <button class="pdf_btn pdf_btn_primary" onclick="pdf_addRow()">＋ Add Row</button>
    <button class="pdf_btn pdf_btn_secondary" onclick="pdf_addColumn()">＋ Add Column</button>
    <button class="pdf_btn pdf_btn_success" onclick="pdf_print()">🖨 Export / Print</button>
  </div>

  <!-- CSS Editor (hidden on print via no-print class) -->
  <div class="pdf_css_panel no-print">
    <div class="pdf_css_panel_header">
      <span>🎨 CSS Editor</span>
      <div class="pdf_css_panel_actions">
        <label class="pdf_btn pdf_btn_secondary" style="cursor:pointer;">
          📂 Load CSS
          <input type="file" id="pdf_css_file_input" accept=".css,text/css" style="display:none;" onchange="pdf_loadCSS(this)" />
        </label>
        <button class="pdf_btn pdf_btn_secondary" onclick="pdf_downloadCSS()">⬇ Download CSS</button>
      </div>
    </div>
    <textarea id="pdf_css_textarea" class="pdf_css_textarea" spellcheck="false" placeholder="/* Load a CSS file or type custom CSS here */"></textarea>
    <button class="pdf_btn pdf_btn_primary pdf_css_apply_btn" onclick="pdf_applyCSS()">✔ Apply CSS</button>
  </div>

  <!-- Table (visible in print) -->
  <div class="pdf_table_wrapper">
    <table class="pdf_table" id="pdf_table"></table>
  </div>

  <!-- Status -->
  <div class="pdf_status no-print" id="pdf_status"></div>

</div>

<script src="../js/pdf_handler.js"></script>
</body>
</html>
